runtime: nodejs20
env: standard

instance_class: F1

# By default, Node.js applications will start using "npm start" (which maps to "node src/index.js").
# App Engine will dynamically assign a port and provide it to your app using the PORT environment variable.

env_variables:
  NODE_ENV: "production"

  # Uncomment and configure these variables for your production environment.
  # Do not commit real production secrets to version control.
  # Secret variables (like MONGODB_URI and JWT_SECRET) are better stored in Google Cloud Secret Manager.
  # MONGODB_URI: "mongodb+srv://user:password@cluster.mongodb.net/dbname"
  # JWT_SECRET: "your_production_jwt_secret"
  # CLIENT_ORIGIN: "https://your-frontend-domain.com"
